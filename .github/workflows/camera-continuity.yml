name: Camera continuity

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: camera-continuity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  camera-continuity:
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Check
        run: cargo check --all-targets

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --all-targets --all-features

      - name: World content gate
        run: ./tools/world_content_gate.sh target/eval/world_content_gate/ci

      - name: Upload failed island hero gallery evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: island-hero-gallery-${{ github.run_id }}
          path: target/eval/world_content_gate/ci/island_hero_gallery
          if-no-files-found: ignore
          retention-days: 7
          compression-level: 0

      - name: Development play performance gate
        env:
          NAU_DEV_PLAY_PERF_MAX_AVG_FRAME_TIME_MS: "70"
          NAU_DEV_PLAY_PERF_MAX_P95_FRAME_TIME_MS: "90"
          NAU_DEV_PLAY_PERF_MAX_FRAME_TIME_MS: "500"
          NAU_DEV_PLAY_PERF_MAX_FRAMES_OVER_16_67MS: "201"
          NAU_DEV_PLAY_PERF_MAX_MATERIAL_COUNT: "116"
          NAU_DEV_PLAY_PERF_RUN_HOST_PREFLIGHT: "0"
        run: ./tools/dev_play_performance_gate.sh target/eval/dev_play_performance/ci

      - name: Compare PR performance with base
        if: github.event_name == 'pull_request'
        env:
          NAU_PERF_ALLOW_BUSY_HOST: "1"
          NAU_PERF_REQUIRE_QUIET_HOST_AFTER: "0"
          # The preceding gate enforces candidate absolute budgets. Keep this
          # same-host step focused on collecting both revisions and rejecting
          # branch-relative regressions, even when the shared runner is noisy.
          NAU_PERF_MAX_AVG_FRAME_TIME_MS: "500"
          NAU_PERF_MAX_P95_FRAME_TIME_MS: "500"
          NAU_PERF_MAX_P99_FRAME_TIME_MS: "500"
          NAU_PERF_SUMMARY_CAMERA_MOUSE_MAX_AVG_FRAME_TIME_REGRESSION_RATIO: "1.15"
          NAU_PERF_SUMMARY_CAMERA_MOUSE_MAX_HITCH_COUNT_REGRESSION_RATIO: "1.25"
        run: |
          baseline_worktree="${RUNNER_TEMP}/nau-engine-perf-base"
          baseline_target="${RUNNER_TEMP}/nau-engine-perf-base-target"
          baseline_output="${GITHUB_WORKSPACE}/target/eval/perf_compare/base"
          candidate_output="${GITHUB_WORKSPACE}/target/eval/perf_compare/candidate"

          git fetch --no-tags origin "${{ github.event.pull_request.base.sha }}"
          rm -rf "${baseline_worktree}" "${baseline_target}"
          git worktree add --detach \
            "${baseline_worktree}" \
            "${{ github.event.pull_request.base.sha }}"

          baseline_status=0
          (
            cd "${baseline_worktree}"
            CARGO_TARGET_DIR="${baseline_target}" \
              NAU_PERF_OUTPUT_DIR="${baseline_output}" \
              ./tools/perf_baseline.sh \
                baseline_route \
                long_glide_visibility \
                camera_mouse_control
          ) || baseline_status=$?

          candidate_status=0
          NAU_PERF_BUILD_FIRST=0 \
            NAU_PERF_OUTPUT_DIR="${candidate_output}" \
            ./tools/perf_baseline.sh \
              baseline_route \
              long_glide_visibility \
              camera_mouse_control || candidate_status=$?

          comparison_status=0
          ./tools/compare_perf_summaries.sh \
            "${baseline_output}/perf_summary.json" \
            "${candidate_output}/perf_summary.json" || comparison_status=$?

          git worktree remove --force "${baseline_worktree}"

          printf 'baseline collection status: %s\n' "${baseline_status}"
          printf 'candidate collection status: %s\n' "${candidate_status}"
          printf 'performance comparison status: %s\n' "${comparison_status}"
          if (( baseline_status != 0 || candidate_status != 0 || comparison_status != 0 )); then
            exit 1
          fi

      - name: Camera continuity gate
        run: ./tools/camera_continuity_gate.sh target/eval/camera_continuity/ci
